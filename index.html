<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 360° e Modelo 3D</title>

    <!-- Pannellum -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 500;
        }

        #panorama {
            width: 90%;
            max-width: 800px;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<h1>Visualização 360°</h1>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
    type: "equirectangular",
    panorama: "https://raissasantana13.github.io/test_visualizador360_modelos3D_museu/imagem_test.jpg",
});
</script>

</body>
</html>
